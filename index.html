<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKTM - Topiku Topimu</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="overlay" id="overlay"></div>

    <header>
        <div class="container">
            <a href="index.html" class="logo">Topiku<span>Topimu</span></a>

            <nav class="nav-links">
                <a href="index.html" class="active">Beranda</a>
                <a href="#produk">Produk</a>
            </nav>

            <div class="header-actions">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="Cari topi...">
                </div>
                <button class="cart-btn" id="open-cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Topiku <span>Topimu</span></h1>
            <p>Koleksi topi premium dengan desain minimalis dan kualitas terbaik untuk gaya harianmu. Temukan karaktermu di sini.</p>
            <a href="#produk" class="btn">Belanja Sekarang</a>
        </div>
    </section>

    <section class="products-section" id="produk">
        <div class="container">
            <div class="section-title">
                <h2>Koleksi Terbaru</h2>
                <div class="line"></div>
            </div>

            <div class="product-grid" id="product-grid">
                <!-- Produk akan dimuat oleh JavaScript -->
            </div>
        </div>
    </section>

    <div class="cart-modal" id="cart-modal">
        <div class="cart-header">
            <h3>Keranjang Belanja</h3>
            <button class="close-cart" id="close-cart">&times;</button>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Item keranjang akan dimuat oleh JavaScript -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="total-price">Rp 0</span>
            </div>
            <button class="btn" style="width: 100%;">Checkout</button>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2024 TKTM - Topiku Topimu. Dibuat dengan semangat.</p>
        </div>
    </footer>

    <script>
        // Data Produk
        const products = [
            { id: 1, name: 'Snapback Noir', category: 'Snapback', price: 150000, image: 'https://images.unsplash.com/photo-1588850561407-ed78c282e89b?q=80&w=500&auto=format&fit=crop' },
            { id: 2, name: 'Crimson Beanie', category: 'Beanie', price: 85000, image: 'https://images.unsplash.com/photo-1576871337622-98d48d896e49?q=80&w=500&auto=format&fit=crop' },
            { id: 3, name: 'Urban Trucker', category: 'Trucker', price: 120000, image: 'https://images.unsplash.com/photo-1556306535-0f09a537f0a3?q=80&w=500&auto=format&fit=crop' },
            { id: 4, name: 'Shadow Bucket Hat', category: 'Bucket', price: 135000, image: 'https://images.unsplash.com/photo-1556306510-31ca015a7d3a?q=80&w=500&auto=format&fit=crop' },
            { id: 5, name: 'Classic Dad Cap', category: 'Baseball', price: 95000, image: 'https://images.unsplash.com/photo-1521369909029-2afed882baee?q=80&w=500&auto=format&fit=crop' },
            { id: 6, name: 'Red Rebel Snapback', category: 'Snapback', price: 165000, image: 'https://images.unsplash.com/photo-1622445210692-01d674482799?q=80&w=500&auto=format&fit=crop' }
        ];

        let cart = [];

        // DOM Elements
        const productGrid = document.getElementById('product-grid');
        const searchInput = document.getElementById('search-input');
        const cartModal = document.getElementById('cart-modal');
        const overlay = document.getElementById('overlay');
        const openCartBtn = document.getElementById('open-cart');
        const closeCartBtn = document.getElementById('close-cart');
        const cartItemsContainer = document.getElementById('cart-items');
        const cartCount = document.getElementById('cart-count');
        const totalPriceElement = document.getElementById('total-price');

        // Render Produk
        function renderProducts(productsToRender) {
            productGrid.innerHTML = '';
            productsToRender.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                productCard.innerHTML = `
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}">
                    </div>
                    <div class="product-info">
                        <p class="product-category">${product.category}</p>
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-price">Rp ${product.price.toLocaleString('id-ID')}</p>
                        <button class="add-to-cart" onclick="addToCart(${product.id})">Tambah ke Keranjang</button>
                    </div>
                `;
                productGrid.appendChild(productCard);
            });
        }

        // Fitur Pencarian
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredProducts = products.filter(product =>
                product.name.toLowerCase().includes(searchTerm) ||
                product.category.toLowerCase().includes(searchTerm)
            );
            renderProducts(filteredProducts);
        });

        // Keranjang Belanja
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCart();
            openCart();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        function updateCart() {
            // Update Count
            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalCount;

            // Render Items
            cartItemsContainer.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;
                const cartItem = document.createElement('div');
                cartItem.className = 'cart-item';
                cartItem.innerHTML = `
                    <img src="${item.image}" class="cart-item-img" alt="${item.name}">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">Rp ${item.price.toLocaleString('id-ID')} x ${item.quantity}</div>
                    </div>
                    <button onclick="removeFromCart(${item.id})" style="background:none; border:none; color:#e11d48; cursor:pointer;"><i class="fas fa-trash"></i></button>
                `;
                cartItemsContainer.appendChild(cartItem);
            });

            totalPriceElement.textContent = `Rp ${total.toLocaleString('id-ID')}`;

            if(cart.length === 0) {
                cartItemsContainer.innerHTML = '<p style="text-align:center; color:#a1a1aa; margin-top:20px;">Keranjang kosong</p>';
            }
        }

        // Modal Controls
        function openCart() {
            cartModal.classList.add('active');
            overlay.classList.add('active');
        }

        function closeCart() {
            cartModal.classList.remove('active');
            overlay.classList.remove('active');
        }

        openCartBtn.addEventListener('click', openCart);
        closeCartBtn.addEventListener('click', closeCart);
        overlay.addEventListener('click', closeCart);

        // Initial Render
        renderProducts(products);
    </script>
</body>
</html>
